name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm install
      - run: npx prisma db push
        env:
          DATABASE_URL: file:./dev.db
      - run: npm test -- --runInBand
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: test-secret
